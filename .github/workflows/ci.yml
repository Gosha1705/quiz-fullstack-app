name: Fullstack CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies & Build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Backend Dependencies & Build
        run: |
          cd backend
          npm install
          npm run build